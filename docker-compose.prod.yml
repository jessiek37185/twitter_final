version: '3.8'

services:
  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile.prod
    command: gunicorn --bind 0.0.0.0:5000 --workers 2 app:app
    volumes:
      - static_volume:/usr/src/app/static
    expose:
      - 5000
    env_file:
      - .env.prod
    depends_on:
      - db

  db:
    build: ./services/postgres
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data/
      - ./services/postgres/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    env_file:
      - .env.prod.db

  nginx:a
    build: ./services/nginx
    volumes:
      - static_volume:/usr/src/app/static
    ports:
      - 80:80
    depends_on:
      - web

volumes:
  postgres_data_prod:
  static_volume:

